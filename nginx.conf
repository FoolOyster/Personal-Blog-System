# Nginx 配置示例
# 将此文件复制到 /etc/nginx/sites-available/blog
# 然后创建软链接: sudo ln -s /etc/nginx/sites-available/blog /etc/nginx/sites-enabled/

# 后端 API 服务器
upstream backend {
    server 127.0.0.1:3000;
}

# 前端网站 - www.yourdomain.com
server {
    listen 80;
    server_name www.yourdomain.com yourdomain.com;

    # 强制跳转到 HTTPS (配置 SSL 证书后启用)
    # return 301 https://$server_name$request_uri;

    root /var/www/blog/frontend/dist;
    index index.html;

    # 前端静态文件
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}

# 后端 API - api.yourdomain.com
server {
    listen 80;
    server_name api.yourdomain.com;

    # 强制跳转到 HTTPS (配置 SSL 证书后启用)
    # return 301 https://$server_name$request_uri;

    # API 代理
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

